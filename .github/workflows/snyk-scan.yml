name: Snyk Scan

on:
  workflow_dispatch:
    inputs:
      enforce_snyk_failure:
        description: 'Set to true to fail the workflow when Snyk finds high severity vulnerabilities'
        required: false
        default: 'false'
        type: boolean

jobs:
  snyk:
    runs-on: ubuntu-latest
    env:
      # metro@0.83.x (pulled in by react-native@0.84) breaks expo export in CI.
      # Snyk dependency scanning doesn't require a production build — it reads
      # the lockfile. Setting this env var makes `turbo build` skip mobile safely.
      SKIP_MOBILE_BUILD: 'true'
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      # Default behavior: warn only. Set the `enforce_snyk_failure` workflow
      # input (or set ENFORCE_SNYK_FAILURE env) to `true` to make the job fail
      # when Snyk finds a vulnerability at or above the configured threshold.
      ENFORCE_SNYK_FAILURE: ${{ github.event.inputs.enforce_snyk_failure }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # No build step needed: Snyk npm dependency scanning works entirely from
      # the lockfile produced by `npm ci`. Running `turbo build` here would
      # compile the mobile/web apps which is unrelated to vulnerability detection
      # and risks breaking the scan on unrelated build errors.

      - name: Snyk test (JSON capture)
        run: |
          npx snyk test --all-projects --json > snyk-results.json || true

      - name: Upload Snyk JSON
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: snyk-results.json

      - name: Generate Markdown report
        run: |
          node ./scripts/snyk-report.js --input snyk-results.json --output sec_reports/snyk-report.md

      - name: Upload Snyk report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: sec_reports/snyk-report.md

      - name: Snyk threshold check (warn)
        run: |
          npx snyk test --all-projects --severity-threshold=high || echo "Snyk reported high severity issues — run the workflow with input 'enforce_snyk_failure: true' to fail the run"

      - name: Enforce severity threshold (fail)
        if: ${{ env.ENFORCE_SNYK_FAILURE == 'true' }}
        run: npx snyk test --all-projects --severity-threshold=high

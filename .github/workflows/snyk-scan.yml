name: Snyk Scan

on:
  push:
    branches: [ main, master, 'release/**' ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build (if required)
        run: npm run build --if-present

      - name: Snyk test (JSON capture)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npx snyk test --all-projects --json > snyk-results.json || true

      - name: Upload Snyk JSON
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: snyk-results.json

      - name: Generate Markdown report
        run: |
          node ./scripts/snyk-report.js --input snyk-results.json --output sec_reports/snyk-report.md

      - name: Upload Snyk report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: sec_reports/snyk-report.md

      - name: Enforce severity threshold
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: npx snyk test --all-projects --severity-threshold=high
